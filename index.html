<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortlist — Finance Alumni Finder</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f9f9f8;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-muted: #9b9b96;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.22);
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --danger: #c0392b;
      --danger-bg: #fdf2f2;
      --success: #2d6a4f;
      --success-bg: #eaf3de;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .brand {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .brand-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      text-align: center;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .tabs {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }

    label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }

    input {
      height: 38px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      padding: 0 12px;
      font-family: var(--font);
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      width: 100%;
      height: 40px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: var(--accent-fg);
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .alert {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 12px;
      display: none;
    }

    .alert.error { background: var(--danger-bg); color: var(--danger); display: block; }
    .alert.success { background: var(--success-bg); color: var(--success); display: block; }

    .footer-link {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1.5rem;
    }

    #signupPanel { display: none; }
  </style>
</head>
<body>

  <div class="brand">Shortlist</div>
  <p class="brand-sub">Finance alumni finder — find your path in</p>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="loginTab" onclick="switchTab('login')">Sign in</div>
      <div class="tab" id="signupTab" onclick="switchTab('signup')">Create account</div>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Login -->
    <div id="loginPanel">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@university.edu" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign in</button>
    </div>

    <!-- Signup -->
    <div id="signupPanel">
      <div class="field">
        <label for="signupName">Full name</label>
        <input type="text" id="signupName" placeholder="Your name" />
      </div>
      <div class="field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@university.edu" />
      </div>
      <div class="field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="Min 8 characters" />
      </div>
      <button class="btn" id="signupBtn" onclick="handleSignup()">Create account</button>
    </div>
  </div>

  <div class="footer-link">By signing up you agree to use this responsibly.</div>

<script>
  const SUPABASE_URL = 'https://mjmgwwhzovqnvedisaow.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qbWd3d2h6b3ZxbnZlZGlzYW93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTQ4MjQsImV4cCI6MjA5NDA5MDgyNH0.IpscZzKQWvozWkJgwSiJYC5rBRBcMOnqnJohCgtohIw';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Redirect if already logged in
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'app.html';
  });

  function switchTab(tab) {
    document.getElementById('loginPanel').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('signupPanel').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('loginTab').classList.toggle('active',  tab === 'login');
    document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
    clearAlert();
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }

  function clearAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
  }

  async function handleLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) { showAlert('Please fill in all fields.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    clearAlert();

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showAlert(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    } else {
      window.location.href = 'app.html';
    }
  }

  async function handleSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const btn      = document.getElementById('signupBtn');

    if (!name || !email || !password) { showAlert('Please fill in all fields.', 'error'); return; }
    if (password.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';
    clearAlert();

    const { error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });

    if (error) {
      showAlert(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Create account';
    } else {
      showAlert('Account created! Check your email to confirm, then sign in.', 'success');
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('loginPanel').style.display !== 'none';
    if (loginVisible) handleLogin(); else handleSignup();
  });
</script>
</body>
</html>
