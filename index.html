<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumni Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f9f9f8;
      --bg-tertiary: #f2f1ee;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-muted: #9b9b96;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.2);
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --info-bg: #e6f1fb;
      --info-text: #185fa5;
      --success-bg: #eaf3de;
      --success-text: #3b6d11;
      --danger: #c0392b;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #252523;
        --bg-tertiary: #2c2c2a;
        --text-primary: #f0ede8;
        --text-secondary: #9b9b96;
        --text-muted: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.18);
        --accent: #f0ede8;
        --accent-fg: #1a1a18;
        --info-bg: #0c2d4a;
        --info-text: #85b7eb;
        --success-bg: #173404;
        --success-text: #c0dd97;
        --danger: #e57373;
      }
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; }

    .topbar {
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .topbar-brand svg { width: 18px; height: 18px; opacity: 0.7; }
    .topbar-sub { font-size: 13px; color: var(--text-secondary); }

    .main { max-width: 980px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; }

    .card { border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 1rem; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }

    input, select {
      height: 36px; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); background: var(--bg-secondary);
      color: var(--text-primary); font-size: 14px; padding: 0 12px;
      font-family: var(--font); outline: none; width: 100%;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="password"] { font-family: var(--font-mono); font-size: 12px; }

    .search-row { display: flex; gap: 10px; align-items: flex-end; }
    .search-row .field { flex: 1; }

    .btn {
      height: 36px; padding: 0 18px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 0.5px solid var(--border-mid);
      background: transparent; color: var(--text-primary);
      white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
    .btn-primary:hover { opacity: 0.88; background: var(--accent); }

    .status { font-size: 13px; color: var(--text-secondary); min-height: 20px; margin-top: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .status.error { color: var(--danger); }

    .spinner { width: 14px; height: 14px; border: 2px solid var(--border-mid); border-top-color: var(--text-primary); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .ai-spinner { width: 10px; height: 10px; border: 1.5px solid var(--border-mid); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-wrap { height: 3px; background: var(--bg-tertiary); border-radius: 99px; margin-top: 10px; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; width: 0%; }

    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .results-count { font-size: 14px; color: var(--text-secondary); }
    .results-count strong { color: var(--text-primary); font-weight: 500; }

    .table-wrap { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); background: var(--bg-secondary); white-space: nowrap; }
    td { padding: 11px 14px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }

    .name-cell { display: flex; align-items: flex-start; gap: 8px; }
    .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--info-bg); color: var(--info-text); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .name-text { font-weight: 500; font-size: 13px; }
    .name-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .linkedin-link { color: var(--info-text); text-decoration: none; font-size: 12px; display: inline-flex; align-items: center; gap: 3px; }
    .linkedin-link:hover { text-decoration: underline; }

    .ai-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--success-bg); color: var(--success-text); font-weight: 500; margin-bottom: 4px; }
    .ai-insight { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .ai-loading { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }

    .email-mono { font-size: 12px; color: var(--info-text); font-family: var(--font-mono); word-break: break-all; }
    .muted { color: var(--text-muted); font-size: 12px; }
    .hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    #resultsSection { display: none; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.2"/>
      <path d="M2 16c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    Alumni Finder
  </div>
  <span class="topbar-sub">PDL + Groq AI</span>
</div>

<div class="main">
  <h1 class="page-title">Find alumni at your target firms</h1>
  <p class="page-sub">Search returns real profiles — Groq AI automatically enriches each result with email guesses and outreach insights</p>

  <div class="card">
    <div class="card-title">API Keys</div>
    <div class="grid-2">
      <div class="field">
        <label for="pdlKey">People Data Labs key</label>
        <input type="password" id="pdlKey" placeholder="Paste PDL key" />
      </div>
      <div class="field">
        <label for="groqKey">Groq AI key</label>
        <input type="password" id="groqKey" placeholder="Paste Groq key" />
        <span class="hint">Free at console.groq.com — no card needed</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Search</div>
    <div class="grid-3">
      <div class="field">
        <label for="school">Your school</label>
        <input type="text" id="school" placeholder="e.g. Cornell University" autocomplete="off" />
      </div>
      <div class="field">
        <label for="firm">Target firm</label>
        <input type="text" id="firm" placeholder="e.g. Goldman Sachs" autocomplete="off" />
      </div>
      <div class="field">
        <label for="resultSize">Max results</label>
        <select id="resultSize">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>
    <div class="search-row">
      <div class="field">
        <label for="role">Role / keyword <span style="text-transform:none;font-weight:400;letter-spacing:0">(optional)</span></label>
        <input type="text" id="role" placeholder="e.g. Investment Banking Analyst, Quant Researcher" />
      </div>
      <button class="btn btn-primary" id="searchBtn" onclick="runSearch()">Search</button>
    </div>
    <div class="status" id="status"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div id="resultsSection">
    <div class="results-header">
      <div class="results-count" id="resultCount"></div>
      <button class="btn" onclick="exportCSV()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Export CSV
      </button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:20%">Name</th>
            <th style="width:18%">Title</th>
            <th style="width:13%">Location</th>
            <th style="width:11%">LinkedIn</th>
            <th style="width:17%">Email (AI guess)</th>
            <th style="width:21%">AI insight</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let currentResults = [];

  document.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg, isError, isHtml) {
    const el = document.getElementById('status');
    el.className = 'status' + (isError ? ' error' : '');
    if (isHtml) el.innerHTML = msg; else el.textContent = msg;
  }

  function setProgress(pct) {
    const wrap = document.getElementById('progressWrap');
    const bar  = document.getElementById('progressBar');
    if (pct <= 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    bar.style.width = Math.min(100, pct) + '%';
  }

  function initials(f, l) { return ((f?.[0]||'')+(l?.[0]||'')).toUpperCase()||'?'; }

  // Correctly extract location from PDL response
  function getLocation(p) {
    // PDL returns location data in multiple possible fields
    const city    = p.location_locality || p.location_metro || '';
    const state   = p.location_region   || '';
    const country = p.location_country  || '';
    if (city && state) return city + ', ' + state;
    if (city) return city;
    if (state) return state;
    if (country) return country;
    return '—';
  }

  async function runSearch() {
    const school  = document.getElementById('school').value.trim();
    const firm    = document.getElementById('firm').value.trim();
    const role    = document.getElementById('role').value.trim();
    const pdlKey  = document.getElementById('pdlKey').value.trim();
    const groqKey = document.getElementById('groqKey').value.trim();
    const size    = parseInt(document.getElementById('resultSize').value);
    const btn     = document.getElementById('searchBtn');

    if (!school || !firm) { setStatus('Please enter both a school and a firm.', true); return; }
    if (!pdlKey)           { setStatus('Please enter your PDL API key.', true); return; }

    btn.disabled = true;
    currentResults = [];
    document.getElementById('resultsSection').style.display = 'none';
    setStatus('<span class="spinner"></span>Searching PDL for ' + esc(school) + ' alumni at ' + esc(firm) + '...', false, true);
    setProgress(5);

    try {
      const must = [
        { term: { "education.school.name": school } },
        { term: { "job_company_name": firm } }
      ];
      if (role) must.push({ term: { "job_title": role } });

      const res = await fetch('https://api.peopledatalabs.com/v5/person/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Api-Key': pdlKey },
        body: JSON.stringify({ query: { bool: { must } }, size, pretty: true })
      });

      const data = await res.json();

      if (!res.ok) {
        const msg = data?.error?.message || data?.message || 'PDL API error — check your key.';
        setStatus(msg, true); setProgress(0); btn.disabled = false; return;
      }

      const people = data.data || [];
      const total  = data.total || people.length;

      if (!people.length) {
        setStatus('No results. Try full school name e.g. "Cornell University" not "Cornell".', false);
        setProgress(0); btn.disabled = false; return;
      }

      currentResults = people.map(p => ({ ...p, aiEmail: null, aiInsight: null }));
      renderTable(school, firm, total);
      document.getElementById('resultsSection').style.display = 'block';
      setProgress(20);

      if (groqKey) {
        setStatus('<span class="spinner"></span>AI enriching ' + people.length + ' profiles...', false, true);
        await Promise.all(currentResults.map((p, i) => enrichPerson(p, i, groqKey, school, firm)));
        setStatus('Done — ' + people.length + ' profiles enriched.' + (total > size ? ' PDL has ' + total + ' total matches; increase max results to see more.' : ''));
      } else {
        setStatus('No Groq key entered — showing PDL data only. Add a Groq key to enable AI enrichment.');
        currentResults.forEach((_, i) => {
          const ins = document.getElementById('insight-' + i);
          if (ins) ins.innerHTML = '<span class="muted">Add Groq key</span>';
          const em  = document.getElementById('email-'   + i);
          if (em)  em.innerHTML  = '<span class="muted">Add Groq key</span>';
        });
      }

      setProgress(100);
      setTimeout(() => setProgress(0), 800);

    } catch (err) {
      setStatus('Network error: ' + err.message, true);
      setProgress(0);
    }

    btn.disabled = false;
  }

  function renderTable(school, firm, total) {
    const body  = document.getElementById('resultsBody');
    const count = document.getElementById('resultCount');

    const showing = currentResults.length;
    count.innerHTML = '<strong>' + showing + '</strong> showing' +
      (total > showing ? ' of <strong>' + total + '</strong> total' : '') +
      ' &mdash; ' + esc(school) + ' &rarr; ' + esc(firm);

    body.innerHTML = '';

    currentResults.forEach((p, i) => {
      const name     = [p.first_name, p.last_name].filter(Boolean).join(' ') || 'Unknown';
      const title    = p.job_title || '—';
      const company  = p.job_company_name || firm;
      const location = getLocation(p);
      const linkedin = p.linkedin_url || null;
      const init     = initials(p.first_name, p.last_name);

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="name-cell">
            <div class="avatar">${esc(init)}</div>
            <div>
              <div class="name-text">${esc(name)}</div>
              <div class="name-sub">${esc(company)}</div>
            </div>
          </div>
        </td>
        <td style="font-size:13px;color:var(--text-secondary)">${esc(title)}</td>
        <td style="font-size:13px;color:var(--text-secondary)">${esc(location)}</td>
        <td>
          ${linkedin
            ? `<a class="linkedin-link" href="${esc(linkedin)}" target="_blank" rel="noopener">
                View
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                  <path d="M2 8L8 2M4 2h4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>`
            : '<span class="muted">—</span>'}
        </td>
        <td id="email-${i}"><div class="ai-loading"><div class="ai-spinner"></div></div></td>
        <td id="insight-${i}"><div class="ai-loading"><div class="ai-spinner"></div>Enriching...</div></td>
      `;
      body.appendChild(tr);
    });
  }

  async function enrichPerson(p, i, groqKey, school, firm) {
    const name     = [p.first_name, p.last_name].filter(Boolean).join(' ');
    const title    = p.job_title || '';
    const location = getLocation(p);

    const prompt = `You are a finance recruiting assistant. Given this alumni profile, return ONLY a JSON object — no markdown, no explanation, no extra text.

Name: ${name}
Title: ${title}
Firm: ${firm}
School: ${school}
Location: ${location}

Return exactly this format:
{"email": "<best guess work email using firm's known convention, e.g. firstname.lastname@gs.com, or 'unknown' if unsure>", "insight": "<1-2 sentence insight for a student cold-emailing this person — what they do, a hook, or outreach tip>"}`;

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + groqKey
        },
        body: JSON.stringify({
          model: 'llama3-8b-8192',
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 220,
          temperature: 0.3
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data?.error?.message || 'Groq error');
      }

      const raw = data?.choices?.[0]?.message?.content || '';
      let parsed = { email: 'unknown', insight: '—' };
      try {
        const m = raw.match(/\{[\s\S]*?\}/);
        if (m) parsed = JSON.parse(m[0]);
      } catch(e) {
        // If JSON parse fails, try to extract manually
        const emailMatch   = raw.match(/"email"\s*:\s*"([^"]+)"/);
        const insightMatch = raw.match(/"insight"\s*:\s*"([^"]+)"/);
        if (emailMatch)   parsed.email   = emailMatch[1];
        if (insightMatch) parsed.insight = insightMatch[1];
      }

      currentResults[i].aiEmail   = parsed.email   || 'unknown';
      currentResults[i].aiInsight = parsed.insight || '—';

      const emailCell   = document.getElementById('email-'   + i);
      const insightCell = document.getElementById('insight-' + i);

      if (emailCell) {
        emailCell.innerHTML = parsed.email && parsed.email !== 'unknown'
          ? `<span class="email-mono">${esc(parsed.email)}</span>`
          : '<span class="muted">Unknown</span>';
      }

      if (insightCell) {
        insightCell.innerHTML = `
          <div class="ai-insight">
            <div class="ai-badge">AI</div>
            <div>${esc(parsed.insight || '—')}</div>
          </div>`;
      }

      const done = currentResults.filter(r => r.aiInsight !== null).length;
      setProgress(20 + Math.round((done / currentResults.length) * 80));

    } catch(err) {
      currentResults[i].aiEmail   = 'error';
      currentResults[i].aiInsight = 'error';
      const ins = document.getElementById('insight-' + i);
      if (ins) ins.innerHTML = `<span class="muted" title="${esc(err.message)}">Error</span>`;
      const em  = document.getElementById('email-'   + i);
      if (em)  em.innerHTML  = '<span class="muted">—</span>';
    }
  }

  function exportCSV() {
    if (!currentResults.length) return;
    const headers = ['Name','First Name','Last Name','Title','Company','Location','LinkedIn','Email (AI)','AI Insight'];
    const rows = currentResults.map(p => [
      [p.first_name, p.last_name].filter(Boolean).join(' '),
      p.first_name || '',
      p.last_name  || '',
      p.job_title  || '',
      p.job_company_name || '',
      getLocation(p),
      p.linkedin_url || '',
      p.aiEmail      || '',
      p.aiInsight    || ''
    ]);
    const csv = [headers,...rows]
      .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
      .join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'alumni_results.csv';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
