<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alumni Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f9f9f8;
      --bg-tertiary: #f2f1ee;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-muted: #9b9b96;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.2);
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --info-bg: #e6f1fb;
      --info-text: #185fa5;
      --danger: #c0392b;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #252523;
        --bg-tertiary: #2c2c2a;
        --text-primary: #f0ede8;
        --text-secondary: #9b9b96;
        --text-muted: #6b6b67;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.18);
        --accent: #f0ede8;
        --accent-fg: #1a1a18;
        --info-bg: #0c2d4a;
        --info-text: #85b7eb;
        --danger: #e57373;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    .topbar {
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-brand svg {
      width: 18px;
      height: 18px;
      opacity: 0.7;
    }

    .topbar-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    .page-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 500;
    }

    input, select {
      height: 36px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      padding: 0 12px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
    }

    input[type="password"] {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .api-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-top: 12px;
    }

    .api-row .field { flex: 1; }

    .btn {
      height: 36px;
      padding: 0 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--text-primary);
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: var(--bg-secondary); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: transparent;
    }

    .btn-primary:hover { opacity: 0.88; background: var(--accent); }

    .status {
      font-size: 13px;
      color: var(--text-secondary);
      min-height: 20px;
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status.error { color: var(--danger); }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.5rem 0;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .results-count {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .results-count strong {
      color: var(--text-primary);
      font-weight: 500;
    }

    .table-wrap {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-secondary);
    }

    td {
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }

    .col-name { width: 22%; }
    .col-title { width: 28%; }
    .col-company { width: 18%; }
    .col-location { width: 18%; }
    .col-linkedin { width: 14%; }

    .linkedin-link {
      color: var(--info-text);
      text-decoration: none;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .linkedin-link:hover { text-decoration: underline; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--info-bg);
      color: var(--info-text);
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      flex-shrink: 0;
      vertical-align: middle;
    }

    .name-cell {
      display: flex;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state svg {
      width: 32px;
      height: 32px;
      margin: 0 auto 12px;
      display: block;
      opacity: 0.3;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-md);
      background: var(--info-bg);
      color: var(--info-text);
      margin-left: 6px;
      vertical-align: middle;
    }

    #resultsSection { display: none; }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="6" r="3.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M2 16c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Alumni Finder
    </div>
    <span class="topbar-sub">Powered by People Data Labs</span>
  </div>

  <div class="main">
    <h1 class="page-title">Find alumni at your target firms</h1>
    <p class="page-sub">Search for professionals from your school working in IB, quant, and finance</p>

    <div class="card">
      <div class="card-title">Search</div>

      <div class="form-grid">
        <div class="field">
          <label for="school">Your school</label>
          <input type="text" id="school" placeholder="e.g. University of Pennsylvania" autocomplete="off" />
        </div>
        <div class="field">
          <label for="firm">Target firm</label>
          <input type="text" id="firm" placeholder="e.g. Goldman Sachs" autocomplete="off" />
        </div>
      </div>

      <div class="field" style="margin-bottom: 0;">
        <label for="role">Role / keyword <span style="text-transform:none;font-weight:400;letter-spacing:0;">(optional)</span></label>
        <input type="text" id="role" placeholder="e.g. Investment Banking Analyst, Quantitative Researcher" />
        <span class="hint">Leave blank to return all roles at the firm</span>
      </div>

      <div class="api-row">
        <div class="field">
          <label for="apikey">PDL API key</label>
          <input type="password" id="apikey" placeholder="Paste your People Data Labs key" />
        </div>
        <button class="btn btn-primary" id="searchBtn" onclick="runSearch()">Search</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div id="resultsSection">
      <div class="results-header">
        <div class="results-count" id="resultCount"></div>
        <button class="btn" onclick="exportCSV()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Export CSV
        </button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="col-name">Name</th>
              <th class="col-title">Title</th>
              <th class="col-company">Firm</th>
              <th class="col-location">Location</th>
              <th class="col-linkedin">LinkedIn</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let currentResults = [];

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') runSearch();
    });

    async function runSearch() {
      const school = document.getElementById('school').value.trim();
      const firm = document.getElementById('firm').value.trim();
      const role = document.getElementById('role').value.trim();
      const apiKey = document.getElementById('apikey').value.trim();
      const status = document.getElementById('status');
      const btn = document.getElementById('searchBtn');

      if (!school || !firm) {
        setStatus('Please enter both a school and a firm.', true);
        return;
      }
      if (!apiKey) {
        setStatus('Please paste your PDL API key.', true);
        return;
      }

      btn.disabled = true;
      document.getElementById('resultsSection').style.display = 'none';
      currentResults = [];
      setStatus('<span class="spinner"></span>Searching...', false, true);

      try {
        const mustClauses = [
          { term: { "education.school.name": school } },
          { term: { "job_company_name": firm } }
        ];

        if (role) mustClauses.push({ term: { "job_title": role } });

        const res = await fetch('https://api.peopledatalabs.com/v5/person/search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Api-Key': apiKey
          },
          body: JSON.stringify({
            query: { bool: { must: mustClauses } },
            size: 25,
            pretty: true
          })
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data?.error?.message || data?.message || 'API error — check your key and try again.';
          setStatus(msg, true);
          btn.disabled = false;
          return;
        }

        const people = data.data || [];

        if (people.length === 0) {
          setStatus('No results found. Try using the full school name (e.g. "University of Pennsylvania" not "Penn").', false);
          btn.disabled = false;
          return;
        }

        currentResults = people;
        renderResults(people, school, firm);
        setStatus('');

      } catch (err) {
        setStatus('Network error: ' + err.message, true);
      }

      btn.disabled = false;
    }

    function setStatus(msg, isError = false, isHtml = false) {
      const el = document.getElementById('status');
      el.className = 'status' + (isError ? ' error' : '');
      if (isHtml) el.innerHTML = msg;
      else el.textContent = msg;
    }

    function initials(first, last) {
      return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
    }

    function renderResults(people, school, firm) {
      const body = document.getElementById('resultsBody');
      const section = document.getElementById('resultsSection');
      const count = document.getElementById('resultCount');

      count.innerHTML = `<strong>${people.length}</strong> result${people.length !== 1 ? 's' : ''} &mdash; ${escHtml(school)} &rarr; ${escHtml(firm)}`;
      body.innerHTML = '';

      people.forEach(p => {
        const firstName = p.first_name || '';
        const lastName = p.last_name || '';
        const name = [firstName, lastName].filter(Boolean).join(' ') || 'Unknown';
        const title = p.job_title || '—';
        const company = p.job_company_name || firm;
        const location = [p.location_locality, p.location_region].filter(Boolean).join(', ') || '—';
        const linkedin = p.linkedin_url || null;
        const init = initials(firstName, lastName);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="col-name">
            <div class="name-cell">
              <span class="avatar" aria-hidden="true">${escHtml(init)}</span>
              <span title="${escHtml(name)}">${escHtml(name)}</span>
            </div>
          </td>
          <td class="col-title" title="${escHtml(title)}">${escHtml(title)}</td>
          <td class="col-company" title="${escHtml(company)}">${escHtml(company)}</td>
          <td class="col-location" title="${escHtml(location)}">${escHtml(location)}</td>
          <td class="col-linkedin">
            ${linkedin
              ? `<a class="linkedin-link" href="${escHtml(linkedin)}" target="_blank" rel="noopener">
                  View
                  <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M2 8L8 2M4 2h4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </a>`
              : '<span style="color:var(--text-muted)">—</span>'}
          </td>
        `;
        body.appendChild(tr);
      });

      section.style.display = 'block';
    }

    function exportCSV() {
      if (!currentResults.length) return;
      const headers = ['Name', 'First Name', 'Last Name', 'Title', 'Company', 'Location', 'LinkedIn URL'];
      const rows = currentResults.map(p => [
        [p.first_name, p.last_name].filter(Boolean).join(' '),
        p.first_name || '',
        p.last_name || '',
        p.job_title || '',
        p.job_company_name || '',
        [p.location_locality, p.location_region].filter(Boolean).join(', '),
        p.linkedin_url || ''
      ]);
      const csv = [headers, ...rows]
        .map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))
        .join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'alumni_results.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
